<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <!-- ===== Viewport (viewport-fit=cover 是 iPhone 安全区适配的关键) ===== -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- ===== 主题颜色（分别适配浅色/暗色模式） ===== -->
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f2f2f7">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">

  <!-- ===== iOS 专用 Meta 标签 ===== -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="My PWA">

  <!-- 禁止 iOS 自动识别电话号码 -->
  <meta name="format-detection" content="telephone=no">

  <!-- ===== Apple Touch Icon（iOS 主屏幕图标，iOS 不读 manifest.json） ===== -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180x180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="icons/icon-167x167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="icons/icon-120x120.png">

  <!-- ===== iOS 启动画面（按设备匹配，必须使用真实 PNG，不能用 data: URL） ===== -->
  <!-- iPhone 15 Pro Max / 14 Pro Max -->
  <link rel="apple-touch-startup-image"
        media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
        href="splash/iPhone_14_Pro_Max_portrait.png">
  <link rel="apple-touch-startup-image"
        media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: landscape)"
        href="splash/iPhone_14_Pro_Max_landscape.png">

  <!-- iPhone 15 Pro / 14 Pro -->
  <link rel="apple-touch-startup-image"
        media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
        href="splash/iPhone_14_Pro_portrait.png">
  <link rel="apple-touch-startup-image"
        media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: landscape)"
        href="splash/iPhone_14_Pro_landscape.png">

  <!-- iPhone 15 / 14 -->
  <link rel="apple-touch-startup-image"
        media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
        href="splash/iPhone_14_portrait.png">
  <link rel="apple-touch-startup-image"
        media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: landscape)"
        href="splash/iPhone_14_landscape.png">

  <!-- iPhone 15 Plus / 14 Plus -->
  <link rel="apple-touch-startup-image"
        media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
        href="splash/iPhone_14_Plus_portrait.png">
  <link rel="apple-touch-startup-image"
        media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: landscape)"
        href="splash/iPhone_14_Plus_landscape.png">

  <!-- iPhone SE / 8 / 7 / 6 -->
  <link rel="apple-touch-startup-image"
        media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
        href="splash/iPhone_SE_portrait.png">
  <link rel="apple-touch-startup-image"
        media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)"
        href="splash/iPhone_SE_landscape.png">

  <!-- iPhone 13 / 12 / 12 Pro -->
  <link rel="apple-touch-startup-image"
        media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
        href="splash/iPhone_13_portrait.png">
  <link rel="apple-touch-startup-image"
        media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: landscape)"
        href="splash/iPhone_13_landscape.png">

  <!-- iPhone 12 mini / 13 mini -->
  <link rel="apple-touch-startup-image"
        media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
        href="splash/iPhone_12_mini_portrait.png">
  <link rel="apple-touch-startup-image"
        media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: landscape)"
        href="splash/iPhone_12_mini_landscape.png">

  <!-- iPad 10.9" / iPad Air -->
  <link rel="apple-touch-startup-image"
        media="(device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
        href="splash/iPad_10_9_portrait.png">
  <link rel="apple-touch-startup-image"
        media="(device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)"
        href="splash/iPad_10_9_landscape.png">

  <!-- iPad Pro 12.9" -->
  <link rel="apple-touch-startup-image"
        media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)"
        href="splash/iPad_Pro_12_9_portrait.png">
  <link rel="apple-touch-startup-image"
        media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: landscape)"
        href="splash/iPad_Pro_12_9_landscape.png">

  <!-- ===== Web App Manifest ===== -->
  <link rel="manifest" href="manifest.json">

  <!-- ===== Favicon 回退 ===== -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">

  <!-- ===== 样式表 ===== -->
  <link rel="stylesheet" href="css/style.css">

  <title>My PWA</title>
</head>
<body>

  <!-- 安全区顶部占位（iPhone 灵动岛/刘海区域） -->
  <div class="safe-area-top"></div>

  <!-- 应用头部：毛玻璃效果导航栏 -->
  <header class="app-header">
    <h1 class="app-title">My PWA</h1>
  </header>

  <!-- 主内容区 -->
  <main class="app-content">
    <!-- 离线提示横幅 -->
    <div id="offline-banner" class="offline-banner hidden">
      &#9888; 您当前处于离线状态
    </div>

    <!-- 安装提示（iOS 用户引导） -->
    <div id="install-hint" class="install-hint hidden">
      <div class="install-hint-content">
        <p><strong>添加到主屏幕</strong></p>
        <p>点击底部 <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle;"><rect x="3" y="3" width="18" height="18" rx="4"/><line x1="9" y1="12" x2="9" y2="20"/><line x1="9" y1="12" x2="20" y2="2"/></svg> 分享按钮，然后选择「添加到主屏幕」</p>
        <button id="dismiss-hint" class="btn btn-primary">知道了</button>
      </div>
    </div>

    <!-- 更新提示横幅 -->
    <div id="update-banner" class="update-banner hidden">
      <span>新版本可用</span>
      <button id="update-now" class="btn btn-small">更新</button>
    </div>

    <!-- 应用主内容 -->
    <div id="app-root">
      <section class="hero">
        <div class="app-icon-large">&#128241;</div>
        <h2>欢迎使用 My PWA</h2>
        <p class="subtitle">这是一个可在 iPhone 上安装的 PWA 模板</p>
      </section>

      <section class="features">
        <div class="card">
          <div class="card-icon">&#9889;</div>
          <h3>离线可用</h3>
          <p>通过 Service Worker 缓存，无网络也能访问</p>
        </div>
        <div class="card">
          <div class="card-icon">&#127968;</div>
          <h3>添加到主屏幕</h3>
          <p>像原生 App 一样从主屏幕图标启动</p>
        </div>
        <div class="card">
          <div class="card-icon">&#127769;</div>
          <h3>暗色模式</h3>
          <p>自动跟随系统浅色/暗色模式切换</p>
        </div>
        <div class="card">
          <div class="card-icon">&#128247;</div>
          <h3>原生体验</h3>
          <p>适配灵动岛、Home Indicator，全屏沉浸</p>
        </div>
      </section>

      <!-- 安装按钮（Chromium 浏览器） -->
      <div class="install-actions">
        <button id="install-button" class="btn btn-primary install-btn hidden">
          安装应用
        </button>
      </div>
    </div>
  </main>

  <!-- 底部导航栏（避开 Home Indicator） -->
  <footer class="app-footer">
    <nav class="tab-bar">
      <button class="tab active" data-tab="home">
        <svg class="tab-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="tab-label">首页</span>
      </button>
      <button class="tab" data-tab="search">
        <svg class="tab-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <span class="tab-label">搜索</span>
      </button>
      <button class="tab" data-tab="settings">
        <svg class="tab-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-4.24-1.41 2 2 0 011.41-1.41l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 014.24-1.41 2 2 0 01-.65 1.41l-.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span class="tab-label">设置</span>
      </button>
    </nav>
  </footer>

  <!-- ===== JavaScript ===== -->
  <script src="js/app.js"></script>
</body>
</html>
